<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nail Turn — Quản lý lượt thợ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP STATS BAR -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="brand-name">Nail Turn</span>
    </div>

    <div class="stat-pills">
      <div class="stat-pill sp-ready">
        <div class="sp-dot" style="background:var(--c-ready)"></div>
        <span class="sp-label">Rảnh</span>
        <span class="sp-val" id="stat-ready">0</span>
      </div>
      <div class="stat-pill sp-busy">
        <div class="sp-dot" style="background:var(--c-busy)"></div>
        <span class="sp-label">Đang làm</span>
        <span class="sp-val" id="stat-busy">0</span>
      </div>
      <div class="stat-pill sp-turns">
        <div class="sp-dot" style="background:#7C6EBA"></div>
        <span class="sp-label">Tổng turn</span>
        <span class="sp-val" id="stat-turns">0</span>
      </div>
      <div class="stat-pill sp-rev">
        <div class="sp-dot" style="background:var(--c-ready)"></div>
        <span class="sp-label">Doanh thu</span>
        <span class="sp-val" id="stat-rev">0đ</span>
      </div>
      <div class="stat-pill sp-tip">
        <div class="sp-dot" style="background:#3B82F6"></div>
        <span class="sp-label">Tip</span>
        <span class="sp-val" id="stat-tip">0đ</span>
      </div>
    </div>

    <div class="topbar-right">
      <span class="shift-tag" id="shift-tag">Ca sáng</span>
      <div class="clock-display">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-day" id="clock-day">--/--</div>
      </div>
    </div>
  </div>
</header>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <button class="nav-btn active" title="Ca làm việc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Ca
    </button>
    <button class="nav-btn" title="Nhân viên">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Thợ
    </button>
    <div class="nav-divider"></div>
    <button class="nav-btn" title="Báo cáo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Báo cáo
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- ACTION BAR -->
    <div class="action-bar">
      <div class="next-worker-card" id="next-worker-card">
        <div>
          <div class="nwc-label" id="nwc-label">LƯỢT TIẾP THEO</div>
          <div class="nwc-name" id="nwc-name">—</div>
          <div class="nwc-sub" id="nwc-sub">Không có thợ rảnh</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;flex-shrink:0">
          <button class="btn btn-rose btn-sm" onclick="assignNext()" style="width:auto;padding:9px 18px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            Giao turn
          </button>
          <button class="btn btn-ghost btn-sm" onclick="addWorker()" style="width:auto;padding:9px 14px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Thêm thợ
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-multi" onclick="toggleMulti()" style="width:auto;padding:9px 14px;color:#3B82F6;border-color:rgba(59,130,246,.25)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Chọn nhóm
          </button>
        </div>
      </div>
    </div>

    <!-- MULTI SELECT BANNER -->
    <div id="multi-bar" class="multi-bar" style="display:none">
      <div>
        <div class="mb-txt">Đã chọn <span id="multi-cnt">0</span> thợ — giao cùng 1 khách</div>
        <div class="mb-sub">Click vào thợ rảnh để chọn/bỏ chọn</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-rose btn-sm" onclick="assignMulti()" style="width:auto">Giao ca</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelMulti()" style="width:auto">✕</button>
      </div>
    </div>

    <!-- STAFF GRID -->
    <div class="staff-grid" id="staff-grid"></div>

  </main>
</div>

<!-- ACTION POPUP -->
<div class="popup-overlay" id="popup-overlay" style="display:none" onclick="closePopupOnOverlay(event)">
  <div class="popup" id="popup">
    <div class="popup-head" id="popup-head"></div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-txt"></span>
</div>

<script src="app.js"></script>
</body>
</html>
