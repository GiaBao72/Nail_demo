<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chia Turn Thợ Nail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1a1917;
  --text-2: #6b6963;
  --text-3: #a8a49e;
  --green: #1a7a4a;
  --green-bg: #e6f5ed;
  --green-border: rgba(26,122,74,0.25);
  --amber: #92580a;
  --amber-bg: #fef3e0;
  --amber-border: rgba(146,88,10,0.25);
  --blue: #1a5fa8;
  --blue-bg: #e8f0fb;
  --blue-border: rgba(26,95,168,0.25);
  --red: #b02020;
  --red-bg: #fdeaea;
  --r: 10px;
  --r-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Be Vietnam Pro',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:1.5rem 1rem 4rem;
}
.app{max-width:520px;margin:0 auto}

.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;
}
.header h1{
  font-size:17px;font-weight:600;letter-spacing:-.01em;
  display:flex;align-items:center;gap:8px;
}
.header h1 svg{width:20px;height:20px;color:var(--text-2)}
.clock{font-size:13px;color:var(--text-2);font-variant-numeric:tabular-nums}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.stat-n{font-size:22px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--text-2);margin-top:3px}

.next-banner{
  display:flex;align-items:center;gap:8px;
  background:var(--green-bg);border:0.5px solid var(--green-border);
  border-radius:var(--r);padding:10px 14px;
  margin-bottom:1.25rem;
  font-size:13px;color:var(--green);font-weight:500;
  transition:all .2s;
}
.next-banner.empty{background:var(--surface2);border-color:var(--border);color:var(--text-2)}
.next-banner svg{width:15px;height:15px;flex-shrink:0}

.section-label{
  font-size:11px;font-weight:600;color:var(--text-3);
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:8px;
}

.queue{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}

.wcard{
  display:flex;align-items:center;gap:11px;
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--r-lg);padding:11px 14px;
  cursor:pointer;transition:background .12s, border-color .12s;
  user-select:none;
}
.wcard:hover{background:#faf9f7;border-color:var(--border-strong)}
.wcard:active{transform:scale(0.99)}
.wcard.busy{background:var(--amber-bg);border-color:var(--amber-border)}
.wcard.off{opacity:.48}

.rank{
  font-size:11px;font-weight:600;color:var(--text-3);
  min-width:18px;text-align:center;
}
.rank.is-next{color:var(--green);font-size:13px}

.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.av-ready{background:var(--green-bg);color:var(--green)}
.av-busy{background:var(--amber-bg);color:var(--amber)}
.av-off{background:var(--surface2);color:var(--text-3)}

.winfo{flex:1;min-width:0}
.wname{font-size:14px;font-weight:500}
.wmeta{font-size:11px;color:var(--text-2);margin-top:1px}

.badge{
  font-size:10px;font-weight:600;padding:3px 8px;
  border-radius:20px;white-space:nowrap;letter-spacing:.02em;
}
.b-ready{background:var(--green-bg);color:var(--green)}
.b-busy{background:var(--amber-bg);color:var(--amber)}
.b-off{background:var(--surface2);color:var(--text-3)}
.b-next{background:var(--blue-bg);color:var(--blue)}

.btn-row{display:flex;gap:8px;flex-wrap:wrap}

button{font-family:inherit;cursor:pointer;transition:all .12s}
.btn-main{
  background:var(--text);color:#fff;border:none;
  border-radius:var(--r);padding:10px 18px;
  font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:6px;
}
.btn-main:hover{background:#333}
.btn-main:active{transform:scale(0.98)}
.btn-ghost{
  background:var(--surface);color:var(--text);
  border:0.5px solid var(--border-strong);
  border-radius:var(--r);padding:10px 14px;
  font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:6px;
}
.btn-ghost:hover{background:var(--surface2)}
.btn-ghost:active{transform:scale(0.98)}

.divider{border:none;border-top:0.5px solid var(--border);margin:1.25rem 0}

/* Modal */
.overlay{
  background:rgba(20,18,14,0.4);
  border-radius:var(--r-lg);
  padding:2rem 1rem;
  display:flex;align-items:center;justify-content:center;
  min-height:200px;margin-bottom:1rem;
}
.modal{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--r-lg);padding:1.25rem;
  width:100%;max-width:320px;
}
.modal-tag{
  font-size:11px;font-weight:600;color:var(--text-3);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem;
}
.modal-name{
  font-size:22px;font-weight:600;line-height:1.1;
  color:var(--blue);margin-bottom:3px;
}
.modal-sub{font-size:12px;color:var(--text-2);margin-bottom:1rem}
.modal-btns{display:flex;flex-wrap:wrap;gap:7px}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--text);color:#fff;border-radius:8px;
  padding:9px 18px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;
  white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

svg{display:inline-block;vertical-align:middle}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3l4 4-4 4M14 7h4M6 13l4 4-4 4M14 17h4"/>
    </svg>
    Chia Turn Thợ
  </h1>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-n" id="cnt-busy">0</div>
    <div class="stat-l">Đang làm</div>
  </div>
  <div class="stat">
    <div class="stat-n" id="cnt-ready">0</div>
    <div class="stat-l">Chờ turn</div>
  </div>
  <div class="stat">
    <div class="stat-n" id="cnt-total">0</div>
    <div class="stat-l">Tổng turn</div>
  </div>
</div>

<div class="next-banner" id="next-banner">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14M13 6l6 6-6 6"/>
  </svg>
  <span id="next-text">Chưa có thợ rảnh</span>
</div>

<div class="section-label">Hàng đợi</div>
<div class="queue" id="queue"></div>

<div class="btn-row">
  <button class="btn-main" onclick="assignNext()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    Có khách — giao turn
  </button>
  <button class="btn-ghost" onclick="addWorker()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Thêm thợ
  </button>
</div>

<hr class="divider">
<div id="panel"></div>

</div>

<div class="toast" id="toast"></div>

<script>
let workers=[
  {id:1,name:'Lan',initials:'LA',turns:0,status:'ready'},
  {id:2,name:'Hoa',initials:'HO',turns:0,status:'ready'},
  {id:3,name:'Mai',initials:'MA',turns:0,status:'ready'},
  {id:4,name:'Tú',initials:'TU',turns:0,status:'ready'},
  {id:5,name:'Bích',initials:'BI',turns:0,status:'ready'},
  {id:6,name:'Linh',initials:'LI',turns:0,status:'ready'},
  {id:7,name:'Ngọc',initials:'NG',turns:0,status:'ready'},
  {id:8,name:'Thảo',initials:'TH',turns:0,status:'ready'},
  {id:9,name:'Yến',initials:'YE',turns:0,status:'ready'},
  {id:10,name:'Dung',initials:'DU',turns:0,status:'ready'},
];
let totalTurns=0,nextId=11;

function clockTick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m;
}
clockTick();setInterval(clockTick,1000);

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

function readyW(){return workers.filter(w=>w.status==='ready')}
function busyW(){return workers.filter(w=>w.status==='busy')}

function render(){
  const ready=readyW();
  const busy=busyW();
  const off=workers.filter(w=>w.status==='off');

  document.getElementById('cnt-busy').textContent=busy.length;
  document.getElementById('cnt-ready').textContent=ready.length;
  document.getElementById('cnt-total').textContent=totalTurns;

  const banner=document.getElementById('next-banner');
  const nextText=document.getElementById('next-text');
  const nxt=ready[0];
  if(nxt){
    banner.className='next-banner';
    nextText.textContent='Lượt tiếp theo: '+nxt.name;
  } else {
    banner.className='next-banner empty';
    nextText.textContent='Không có thợ rảnh';
  }

  const q=document.getElementById('queue');
  q.innerHTML='';
  const all=[...ready,...busy,...off];
  all.forEach(w=>{
    const isNext=w===ready[0];
    const readyIdx=ready.indexOf(w);

    const card=document.createElement('div');
    card.className='wcard'+(w.status==='busy'?' busy':'')+(w.status==='off'?' off':'');
    card.onclick=()=>openMenu(w.id);

    const rankDiv=document.createElement('div');
    rankDiv.className='rank'+(isNext?' is-next':'');
    rankDiv.textContent=w.status==='ready'?(readyIdx+1):'—';

    const avDiv=document.createElement('div');
    const avCls=w.status==='ready'?'av-ready':w.status==='busy'?'av-busy':'av-off';
    avDiv.className='avatar '+avCls;
    avDiv.textContent=w.initials;

    const info=document.createElement('div');
    info.className='winfo';
    info.innerHTML='<div class="wname">'+w.name+'</div><div class="wmeta">'+w.turns+' turn hôm nay</div>';

    const bdg=document.createElement('span');
    if(isNext){bdg.className='badge b-next';bdg.textContent='Tiếp theo';}
    else if(w.status==='ready'){bdg.className='badge b-ready';bdg.textContent='Rảnh';}
    else if(w.status==='busy'){bdg.className='badge b-busy';bdg.textContent='Đang làm';}
    else{bdg.className='badge b-off';bdg.textContent='Nghỉ';}

    card.append(rankDiv,avDiv,info,bdg);
    q.appendChild(card);
  });
}

function assignNext(){
  const ready=readyW();
  if(!ready.length){toast('Không có thợ rảnh!');return;}
  const w=ready[0];
  w.status='busy';w.turns++;totalTurns++;
  toast('Đã giao turn cho '+w.name);
  showAssigned(w);render();
}

function showAssigned(w){
  document.getElementById('panel').innerHTML=`
    <div class="overlay">
      <div class="modal">
        <div class="modal-tag">Đã giao turn</div>
        <div class="modal-name">${w.name}</div>
        <div class="modal-sub">Đang phục vụ khách &nbsp;·&nbsp; Turn thứ ${w.turns} hôm nay</div>
        <div class="modal-btns">
          <button class="btn-main" onclick="finishWorker(${w.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Xong — trả về hàng
          </button>
          <button class="btn-ghost" onclick="clearPanel()">Đóng</button>
        </div>
      </div>
    </div>`;
}

function openMenu(id){
  const w=workers.find(x=>x.id===id);if(!w)return;
  let btns='';
  if(w.status==='ready'){
    btns+=`<button class="btn-main" onclick="assignWorker(${id})">Giao turn ngay</button>`;
    btns+=`<button class="btn-ghost" onclick="setStatus(${id},'off')">Cho nghỉ</button>`;
  } else if(w.status==='busy'){
    btns+=`<button class="btn-main" onclick="finishWorker(${id})">Xong việc</button>`;
  } else {
    btns+=`<button class="btn-main" onclick="setStatus(${id},'ready')">Vào làm lại</button>`;
    btns+=`<button class="btn-ghost" onclick="removeWorker(${id})" style="color:var(--red)">Xóa khỏi ca</button>`;
  }
  btns+=`<button class="btn-ghost" onclick="clearPanel()">Đóng</button>`;
  document.getElementById('panel').innerHTML=`
    <div class="overlay">
      <div class="modal">
        <div class="modal-tag">Quản lý thợ</div>
        <div class="modal-name">${w.name}</div>
        <div class="modal-sub">${w.turns} turn hôm nay &nbsp;·&nbsp; ${w.status==='ready'?'Rảnh':w.status==='busy'?'Đang làm':'Nghỉ'}</div>
        <div class="modal-btns">${btns}</div>
      </div>
    </div>`;
}

function assignWorker(id){
  const w=workers.find(x=>x.id===id);
  if(!w||w.status!=='ready')return;
  w.status='busy';w.turns++;totalTurns++;
  toast('Đã giao turn cho '+w.name);
  showAssigned(w);render();
}

function finishWorker(id){
  const w=workers.find(x=>x.id===id);if(!w)return;
  workers=workers.filter(x=>x.id!==id);
  w.status='ready';
  workers.push(w);
  toast(w.name+' đã xong việc, về cuối hàng');
  clearPanel();render();
}

function setStatus(id,s){
  const w=workers.find(x=>x.id===id);if(!w)return;
  workers=workers.filter(x=>x.id!==id);
  w.status=s;
  workers.push(w);
  toast(w.name+': '+(s==='off'?'Cho nghỉ':'Vào làm lại'));
  clearPanel();render();
}

function removeWorker(id){
  const w=workers.find(x=>x.id===id);
  if(!confirm('Xóa '+w.name+' khỏi ca hôm nay?'))return;
  workers=workers.filter(x=>x.id!==id);
  clearPanel();render();
}

function addWorker(){
  const name=prompt('Tên thợ mới:');
  if(!name||!name.trim())return;
  const n=name.trim();
  const ini=n.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
  workers.push({id:nextId++,name:n,initials:ini,turns:0,status:'ready'});
  toast('Đã thêm thợ '+n);
  render();
}

function clearPanel(){document.getElementById('panel').innerHTML='';}

render();
</script>
</body>
</html>
