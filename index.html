<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nail Turn — Quản lý lượt thợ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/mobile.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E11D48">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>

<!-- TOP STATS BAR -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" style="width:220px;padding:0 18px;gap:10px">
      <div class="brand-icon"><i class="ph-fill ph-heart" style="font-size:18px;line-height:1"></i></div>
      <span class="brand-name">Nail Turn</span>
    </div>
    <div class="stat-pills">
      <div class="stat-pill sp-ready">
        <div class="sp-dot" style="background:var(--c-ready)"></div>
        <span class="sp-label">Rảnh</span>
        <span class="sp-val" id="stat-ready">0</span>
      </div>
      <div class="stat-pill sp-busy">
        <div class="sp-dot" style="background:var(--c-busy)"></div>
        <span class="sp-label">Đang làm</span>
        <span class="sp-val" id="stat-busy">0</span>
      </div>
      <div class="stat-pill sp-turns">
        <div class="sp-dot" style="background:#7C6EBA"></div>
        <span class="sp-label">Tổng turn</span>
        <span class="sp-val" id="stat-turns">0</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="shift-tag" id="shift-tag">Ca sáng</span>
      <div class="clock-display">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-day" id="clock-day">--/--</div>
      </div>
    </div>
  </div>
</header>

<!-- APP BODY -->
<div class="app-body">
  <!-- SIDEBAR (desktop) -->
  <nav class="sidebar">
    <span class="nav-group-label">Quản lý ca</span>
    <button class="nav-btn active" data-tab="shift" onclick="setTab('shift')" title="Ca làm việc">
      <i class="ph-bold ph-calendar-check" style="font-size:18px;line-height:1"></i>
      Ca làm việc
    </button>
    <button class="nav-btn" data-tab="report" onclick="setTab('report')" title="Báo cáo">
      <i class="ph-bold ph-chart-bar" style="font-size:18px;line-height:1"></i>
      Báo cáo lịch sử
    </button>
    <div class="nav-divider"></div>
    <span class="nav-group-label">Quản lý</span>
    <button class="nav-btn" data-tab="settings" data-pane="staff" onclick="setTab('settings');switchSettingsPane('staff')" title="Nhân viên">
      <i class="ph-bold ph-users-three" style="font-size:18px;line-height:1"></i>
      Nhân viên
    </button>
    <button class="nav-btn" data-tab="settings" data-pane="services" onclick="setTab('settings');switchSettingsPane('services')" title="Dịch vụ">
      <i class="ph-bold ph-scissors" style="font-size:18px;line-height:1"></i>
      Dịch vụ
    </button>
    <button class="nav-btn" data-tab="settings" data-pane="system" onclick="setTab('settings');switchSettingsPane('system')" title="Hệ thống">
      <i class="ph-bold ph-sliders-horizontal" style="font-size:18px;line-height:1"></i>
      Hệ thống
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <!-- JS renders tab content here -->
  </main>
</div>

<!-- ACTION POPUP -->
<div class="popup-overlay" id="popup-overlay" style="display:none" onclick="closePopupOnOverlay(event)">
  <div class="popup" id="popup">
    <div class="popup-head" id="popup-head"></div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-txt"></span>
</div>

<!-- BOTTOM NAV (mobile only) -->
<nav class="bottom-nav" style="display:none">
  <button class="nav-btn active" onclick="setTab('shift')">
    <i class="ph-bold ph-calendar-check" style="font-size:18px;line-height:1"></i>
    Ca
  </button>
  <button class="nav-btn" onclick="setTab('report')">
    <i class="ph-bold ph-chart-bar" style="font-size:18px;line-height:1"></i>
    Báo cáo
  </button>
  <button class="nav-btn" onclick="setTab('settings')">
    <i class="ph-bold ph-sliders-horizontal" style="font-size:18px;line-height:1"></i>
    Cài đặt
  </button>
</nav>

<!-- Core: constants & data -->
<script src="src/js/config.js"></script>
<script src="src/js/state.js"></script>
<script src="src/js/utils.js"></script>
<!-- View layer -->
<script src="src/js/drag.js"></script>
<script src="src/js/kanban.js"></script>
<script src="src/js/render.js"></script>
<!-- Business logic -->
<script src="src/js/workers.js"></script>
<script src="src/js/popups.js"></script>
<script src="src/js/reports.js"></script>
<script src="src/js/settings.js"></script>
<!-- App shell -->
<script src="src/js/tabs.js"></script>
<script src="src/js/clock.js"></script>
<script src="src/js/main.js"></script>
<script src="src/js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
</body>
</html>
